apiVersion: newrelic.com/v1alpha2
kind: Instrumentation
metadata:
  name: newrelic-instrumentation
  namespace: newrelic
spec:
  agent:
    language: java
    # New Relic Java agent (latest version with HTTPS support)
    image: newrelic/newrelic-java-init:latest
    env:
      # Service identification
      - name: NEW_RELIC_APP_NAME
        value: "GCP High Volume - App"
      - name: NEW_RELIC_LABELS
        value: "environment:prod;cluster:gcp-high-volume-cluster"

      # Route through pipeline control gateway (HTTPS on port 443)
      - name: NEW_RELIC_HOST
        value: "pipeline-control-gateway.newrelic.svc.cluster.local"
      - name: NEW_RELIC_PORT
        value: "443"

      # Path to CA certificate for TLS validation
      - name: NEW_RELIC_CA_BUNDLE_PATH
        value: "/etc/ssl/certs/gateway-ca.crt"

      # Proxy scheme for gateway connection
      - name: NEW_RELIC_PROXY_SCHEME
        value: "https"

  licenseKeySecret: newrelic-license

  # Only instrument pods in the prod namespace
  namespaceLabelSelector:
    matchLabels:
      name: prod

  resource:
    addK8sUIDAttributes: true
