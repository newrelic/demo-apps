global:
  # License key should be set via helm --set or environment variable
  # licenseKey: ""
  cluster: gcp-high-volume-cluster

  # Route through pipeline control gateway
  # Reference: https://docs.newrelic.com/docs/new-relic-control/pipeline-control/gateway/overview/
  customAttributes:
    clusterName: gcp-high-volume-cluster
    environment: prod

# Infrastructure monitoring - route through gateway
newrelic-infrastructure:
  enabled: true
  privileged: true
  config:
    # Route through NGINX TLS proxy (like APM agents)
    collector_url: "https://nr-gateway-proxy.newrelic.svc.cluster.local:443/v1/data"
    identity_url: "https://nr-gateway-proxy.newrelic.svc.cluster.local:443/identity/v1"
    proxy_validate_certificates: false  # Disable cert validation (self-signed CA)

  # Mount NGINX CA certificate for TLS validation
  kubelet:
    extraVolumes:
      - name: nginx-ca
        configMap:
          name: nginx-gateway-ca
    extraVolumeMounts:
      - name: nginx-ca
        mountPath: /etc/ssl/certs/nginx
        readOnly: true

# Kube State Metrics
ksm:
  enabled: true
  # Mount NGINX CA certificate for TLS validation
  extraVolumes:
    - name: nginx-ca
      configMap:
        name: nginx-gateway-ca
  extraVolumeMounts:
    - name: nginx-ca
      mountPath: /etc/ssl/certs/nginx
      readOnly: true

# Kubernetes Events
kubeEvents:
  enabled: true

# k8s-agents-operator (manages Instrumentation CRDs)
k8s-agents-operator:
  enabled: true

# Logging - route through gateway
# DISABLED: Gateway only listens on HTTPS 443 with self-signed cert
# FluentBit's newrelic output plugin can't disable TLS verification
# Alternative: Use OTLP or configure gateway to listen on HTTP
newrelic-logging:
  enabled: false
  # endpoint: "http://pipeline-control-gateway.newrelic.svc.cluster.local:80"
