global:
  licenseKey: ${NEW_RELIC_LICENSE_KEY}
  cluster: gcp-high-volume-cluster

  # Route through pipeline control gateway
  # Reference: https://docs.newrelic.com/docs/new-relic-control/pipeline-control/gateway/overview/
  customAttributes:
    clusterName: gcp-high-volume-cluster
    environment: prod

# Infrastructure monitoring - route through gateway
newrelic-infrastructure:
  enabled: true
  privileged: true
  config:
    # Gateway endpoints for New Relic proprietary protocol (HTTP - gateway doesn't expose port 80)
    # Note: Gateway only listens on HTTPS 443, not HTTP 80
    collector_url: "https://pipeline-control-gateway.newrelic.svc.cluster.local:443/v1/data"
    identity_url: "https://pipeline-control-gateway.newrelic.svc.cluster.local:443/identity/v1"
    proxy_validate_certificates: false

# Kube State Metrics
ksm:
  enabled: true

# Kubernetes Events
kubeEvents:
  enabled: true

# k8s-agents-operator (manages Instrumentation CRDs)
k8s-agents-operator:
  enabled: true

# Logging - route through gateway
# DISABLED: Gateway only listens on HTTPS 443 with self-signed cert
# FluentBit's newrelic output plugin can't disable TLS verification
# Alternative: Use OTLP or configure gateway to listen on HTTP
newrelic-logging:
  enabled: false
