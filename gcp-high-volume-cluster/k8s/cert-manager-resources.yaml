---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nginx-proxy-ca
  namespace: newrelic
spec:
  isCA: true
  commonName: nr-gateway-proxy-ca
  secretName: nginx-proxy-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: nginx-proxy-ca-issuer
  namespace: newrelic
spec:
  ca:
    secretName: nginx-proxy-ca-secret
