apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-{{NUM}}
  namespace: prod
spec:
  replicas: 5
  selector:
    matchLabels:
      app: app-{{NUM}}
  template:
    metadata:
      labels:
        app: app-{{NUM}}
      annotations:
        instrumentation.newrelic.com/inject-java: "true"
    spec:
      initContainers:
      - name: import-gateway-ca
        image: eclipse-temurin:17-jre
        command:
        - /bin/sh
        - -c
        - |
          cp $JAVA_HOME/lib/security/cacerts /truststore/cacerts
          chmod 644 /truststore/cacerts
          keytool -import -trustcacerts -alias nginx-gateway-ca \
            -file /etc/ssl/certs/nginx-ca.crt \
            -keystore /truststore/cacerts \
            -storepass changeit -noprompt
          echo "NGINX CA certificate imported successfully"
        volumeMounts:
        - name: nginx-ca
          mountPath: /etc/ssl/certs/nginx-ca.crt
          subPath: ca.crt
          readOnly: true
        - name: truststore
          mountPath: /truststore
      containers:
      - name: app
        image: us-west1-docker.pkg.dev/{{PROJECT_ID}}/demo-apps/hello-world:latest
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-javaagent:/nri-java--app/newrelic-agent.jar -Djavax.net.ssl.trustStore=/truststore/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
        - name: SERVICE_NAME
          value: "app-{{NUM}}"
        - name: ERROR_RATE
          value: "0.10"
        - name: NEW_RELIC_APP_NAME
          value: "GCP High Volume - App {{NUM}}"
        - name: NEW_RELIC_LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: newrelic-license
              key: license-key
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: truststore
          mountPath: /truststore
          readOnly: true
        - name: nginx-ca
          mountPath: /etc/ssl/certs/nginx-ca.crt
          subPath: ca.crt
          readOnly: true
      volumes:
      - name: truststore
        emptyDir: {}
      - name: nginx-ca
        configMap:
          name: nr-gateway-proxy-ca
---
apiVersion: v1
kind: Service
metadata:
  name: app-{{NUM}}
  namespace: prod
spec:
  selector:
    app: app-{{NUM}}
  ports:
  - port: 8080
    targetPort: 8080
