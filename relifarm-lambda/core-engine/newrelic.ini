; =============================================================================
; New Relic Python agent config — ReliFarm core-engine
; License key + app name are overridden by environment variables in the
; Dockerfile/docker-compose, so this file is safe to commit.
; =============================================================================

[newrelic]
app_name = relifarm-core-engine
monitor_mode = true
log_level = info
log_file = stdout
ssl = true
high_security = false
transaction_tracer.enabled = true
transaction_tracer.transaction_threshold = apdex_f
transaction_tracer.record_sql = obfuscated
transaction_tracer.stack_trace_threshold = 0.5
error_collector.enabled = true
error_collector.ignore_status_codes = 404
browser_monitoring.auto_instrument = false
thread_profiler.enabled = true
distributed_tracing.enabled = true
application_logging.enabled = true
application_logging.forwarding.enabled = true
application_logging.local_decorating.enabled = true

; Demo intent: collect ~100% of spans + transactions. The agent uses reservoir
; sampling; setting these to the agent's maximum (10000 per 60s harvest cycle)
; means we'd need >10k spans/minute before any reservoir overflow. This demo
; produces orders of magnitude less. For true server-side 100% (no agent-side
; reservoir at all), enable NR Infinite Tracing.
span_events.max_samples_stored        = 10000
transaction_events.max_samples_stored = 10000

[newrelic:development]
monitor_mode = true

[newrelic:production]
monitor_mode = true
