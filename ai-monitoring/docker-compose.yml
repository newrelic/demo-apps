name: aim

services:
  # Model A - Reliable JSON formatting (Mistral 7B Instruct v0.3)
  ollama-model-a:
    build:
      context: .
      dockerfile: Dockerfile.ollama-model-a
    container_name: aim-ollama-model-a
    ports:
      - "11434:11434"
    volumes:
      - ollama-data-a:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1          # Only process 1 request at a time
      - OLLAMA_MAX_LOADED_MODELS=1     # Only keep 1 model in memory
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-6}  # Half your physical cores; override in .env (e.g. 4 for 8-core)
      - OLLAMA_CONTEXT_LENGTH=4096     # 3-step workflow fits easily; smaller KV cache benefits both CPU and GPU
      - OLLAMA_KEEP_ALIVE=-1           # Keep model loaded indefinitely; eliminates cold-start on CPU and GPU
      - OLLAMA_FLASH_ATTENTION=1       # Flash attention — beneficial on GPU, helps memory bandwidth on CPU
      - OLLAMA_KV_CACHE_TYPE=q8_0     # Quantize KV cache to 8-bit; halves cache RAM/VRAM vs f16
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aim-network
    deploy:
      resources:
        limits:
          cpus: '12.0'
          memory: 6G                   # mistral:7b at q4_0 ≈ 4GB weights; 6G gives headroom
        reservations:
          cpus: '6.0'
          memory: 4G
    restart: unless-stopped


  # Model B - Ministral 8B with 4-bit mixed quantization (q4_K_M)
  ollama-model-b:
    build:
      context: .
      dockerfile: Dockerfile.ollama-model-b
    container_name: aim-ollama-model-b
    ports:
      - "11435:11434"
    volumes:
      - ollama-data-b:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1          # Only process 1 request at a time
      - OLLAMA_MAX_LOADED_MODELS=1     # Only keep 1 model in memory
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-6}  # Half your physical cores; override in .env (e.g. 4 for 8-core)
      - OLLAMA_CONTEXT_LENGTH=4096     # 3-step workflow fits easily; smaller KV cache benefits both CPU and GPU
      - OLLAMA_KEEP_ALIVE=-1           # Keep model loaded indefinitely; eliminates cold-start on CPU and GPU
      - OLLAMA_FLASH_ATTENTION=1       # Flash attention — beneficial on GPU, helps memory bandwidth on CPU
      - OLLAMA_KV_CACHE_TYPE=q8_0     # Quantize KV cache to 8-bit; halves cache RAM/VRAM vs f16
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aim-network
    deploy:
      resources:
        limits:
          cpus: '12.0'
          memory: 6G                   # ministral-3:8b q4_K_M ≈ 5GB weights; 6G gives headroom
        reservations:
          cpus: '6.0'
          memory: 5G
    restart: unless-stopped


  # MCP Server - Tool interface for generic system operations
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: aim-mcp-server
    ports:
      - "8002:8002"
    environment:
      - MCP_PORT=${MCP_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME_MCP_SERVER}
      - NEW_RELIC_LABELS=${NEW_RELIC_LABELS}      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 60s
      timeout: 5s
      retries: 3
    networks:
      - aim-network
    restart: unless-stopped

  # AI Agent - LangChain reasoning engine with A/B model support
  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    container_name: aim-ai-agent
    ports:
      - "8001:8001"
    environment:
      - MCP_SERVER_URL=${MCP_SERVER_URL}
      - OLLAMA_MODEL_A_URL=${OLLAMA_MODEL_A_URL}
      - OLLAMA_MODEL_B_URL=${OLLAMA_MODEL_B_URL}
      - MODEL_A_NAME=${MODEL_A_NAME}
      - MODEL_B_NAME=${MODEL_B_NAME}
      - AGENT_PORT=${AGENT_PORT}
      - AGENT_MAX_ITERATIONS=${AGENT_MAX_ITERATIONS:-10}
      - AGENT_MAX_EXECUTION_TIME=${AGENT_MAX_EXECUTION_TIME:-600}  # 600s to support forced_full_repair (3 steps × ~70s each)
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME_AI_AGENT}
      - NEW_RELIC_LABELS=${NEW_RELIC_LABELS}
    depends_on:
      ollama-model-a:
        condition: service_healthy
      ollama-model-b:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 5s
      retries: 3
    networks:
      - aim-network
    restart: unless-stopped

  # Flask UI - Web interface for tool execution and chat pages
  # Features: Server-side rendering, AJAX polling, Flask sessions
  # New Relic: Automatic browser monitoring via APM agent (WSGI)
  flask-ui:
    build:
      context: ./flask-ui
      dockerfile: Dockerfile
    container_name: aim-flask-ui
    ports:
      - "8501:8501"
    environment:
      - AGENT_URL=${AGENT_URL}
      - MCP_URL=${MCP_URL}
      - SECRET_KEY=${FLASK_SECRET_KEY:-demo-secret-key-change-in-production}
      # New Relic
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME_FLASK_UI}
      - NEW_RELIC_CONFIG_FILE=/app/newrelic.ini
      - NEW_RELIC_LABELS=${NEW_RELIC_LABELS}
    depends_on:
      ai-agent:
        condition: service_healthy
    networks:
      - aim-network
    restart: unless-stopped

  # Locust - Passive load generation for New Relic telemetry
  # Automatically generates 5-10 requests/hour with comprehensive prompt pool
  # Includes MCP tool tests, chat, errors, boundaries, and abusive language scenarios
  locust:
    build:
      context: .
      dockerfile: locust-tests/Dockerfile
    container_name: aim-locust
    ports:
      - "8089:8089"  # Web UI still available for manual testing
    environment:
      - FLASK_UI_URL=${FLASK_UI_URL}
      - AI_AGENT_URL=${AI_AGENT_URL}
      - LOCUST_WEB_PORT=${LOCUST_WEB_PORT}
    command: >
      --autostart
      --web-host 0.0.0.0
      --web-port 8089
      --host http://ai-agent:8001
      --users 1
      --spawn-rate 1
      --run-time 876000h
      PassiveLoadUser
    depends_on:
      ai-agent:
        condition: service_healthy
    networks:
      - aim-network
    restart: unless-stopped

networks:
  aim-network:
    driver: bridge
    name: aim-network

volumes:
  ollama-data-a:
    name: aim-ollama-data-a
  ollama-data-b:
    name: aim-ollama-data-b
