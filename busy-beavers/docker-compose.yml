name: busy-beavers

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: busy-beavers-backend
    environment:
      - PORT=5001
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY:-}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME_BACKEND:-busy-beavers_backend}
      - NEW_RELIC_CONFIG_FILE=/app/newrelic.ini
      - NEW_RELIC_LOG=stdout
    ports:
      - "5001:5001"
    networks:
      - busy-beavers-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: busy-beavers-frontend
    environment:
      - PORT=5000
      - BACKEND_URL=http://backend:5001
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY:-}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME_FRONTEND:-busy-beavers_frontend}
      - NEW_RELIC_CONFIG_FILE=/app/newrelic.ini
      - NEW_RELIC_LOG=stdout
      - NEW_RELIC_API_KEY=${NEW_RELIC_API_KEY:-}
    ports:
      - "5000:5000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - busy-beavers-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  loadgen:
    build:
      context: ./loadgen
      dockerfile: Dockerfile
    container_name: busy-beavers-loadgen
    environment:
      - FRONTEND_URL=http://frontend:5000
      - LOADGEN_USERS=${LOADGEN_USERS:-2}
      - LOADGEN_INTERVAL=${LOADGEN_INTERVAL:-6}
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - busy-beavers-network
    restart: unless-stopped

networks:
  busy-beavers-network:
    driver: bridge
    name: busy-beavers-network
